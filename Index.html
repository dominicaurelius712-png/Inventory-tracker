<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Inventory Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header -->
        <header class="flex justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Inventory Tracker</h1>
                <p class="text-sm text-gray-500">Local IndexedDB Storage</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-semibold text-gray-600">Total Items: <span id="total-count" class="text-indigo-600">0</span></p>
                <p class="text-sm font-semibold text-gray-600">Total Value: $<span id="total-value" class="text-green-600">0.00</span></p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Form Section -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-1 h-fit">
                <h2 class="text-lg font-semibold mb-4" id="form-title">Add New Item</h2>
                <form id="inventory-form" class="space-y-4">
                    <input type="hidden" id="item-id">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Item Name</label>
                        <input type="text" id="item-name" required placeholder="e.g. Mechanical Keyboard" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                        <select id="item-category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white">
                            <option value="Electronics">Electronics</option>
                            <option value="Office Supplies">Office Supplies</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                            <input type="number" id="item-quantity" required min="0" step="1" placeholder="0" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Unit Price ($)</label>
                            <input type="number" id="item-price" required min="0" step="0.01" placeholder="0.00" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors">
                        </div>
                    </div>

                    <div class="pt-2 flex gap-2">
                        <button type="submit" id="submit-btn" class="flex-1 bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-200 font-medium transition-colors">
                            Save Item
                        </button>
                        <button type="button" id="cancel-btn" class="hidden px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium transition-colors">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- List Section -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 lg:col-span-2 overflow-hidden flex flex-col">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-lg font-semibold">Current Inventory</h2>
                    <input type="text" id="search-input" placeholder="Search items..." 
                        class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm w-48 transition-colors">
                </div>
                
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider border-b border-gray-200">
                                <th class="p-4 font-medium">Item</th>
                                <th class="p-4 font-medium">Category</th>
                                <th class="p-4 font-medium text-right">Qty</th>
                                <th class="p-4 font-medium text-right">Price</th>
                                <th class="p-4 font-medium text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-list" class="divide-y divide-gray-100 text-sm">
                            <!-- Items will be injected here by JS -->
                        </tbody>
                    </table>
                </div>
                
                <div id="empty-state" class="hidden p-8 text-center text-gray-500">
                    <svg class="w-12 h-12 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                    <p>No items found. Add some inventory to get started.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 z-50">
        <span id="toast-message">Action successful</span>
    </div>

    <script>
        // --- 1. Database Initialization ---
        const DB_NAME = 'InventoryManagerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'items';
        let db;

        // Initialize IndexedDB
        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = (event) => {
                    console.error("Database error:", event.target.error);
                    showToast("Failed to open database!", "error");
                    reject(event.target.error);
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    // Create object store with an auto-incrementing ID
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        // Create indexes for searching
                        store.createIndex('name', 'name', { unique: false });
                        store.createIndex('category', 'category', { unique: false });
                    }
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve(db);
                };
            });
        };

        // --- 2. Database Operations ---
        const addItem = (item) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.add(item);
                
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const updateItem = (item) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put(item); // put updates if key exists
                
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        };

        const deleteItem = (id) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete(Number(id));
                
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        };

        const getAllItems = () => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        // --- 3. UI logic and Event Listeners ---
        const form = document.getElementById('inventory-form');
        const listContainer = document.getElementById('inventory-list');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const cancelBtn = document.getElementById('cancel-btn');
        const formTitle = document.getElementById('form-title');
        let currentItems = [];

        // Formatting utilities
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
        };

        // UI Updates
        const updateDashboardStats = (items) => {
            const totalCount = items.reduce((sum, item) => sum + Number(item.quantity), 0);
            const totalValue = items.reduce((sum, item) => sum + (Number(item.quantity) * Number(item.price)), 0);
            
            document.getElementById('total-count').textContent = totalCount;
            document.getElementById('total-value').textContent = formatCurrency(totalValue).replace('$', '');
        };

        const renderItems = (items) => {
            listContainer.innerHTML = '';
            
            if (items.length === 0) {
                emptyState.classList.remove('hidden');
                listContainer.parentElement.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            listContainer.parentElement.classList.remove('hidden');

            items.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition-colors group';
                
                const totalVal = Number(item.quantity) * Number(item.price);
                const isLowStock = Number(item.quantity) < 5;
                const stockBadge = isLowStock ? `<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">Low</span>` : '';

                tr.innerHTML = `
                    <td class="p-4 whitespace-nowrap">
                        <div class="font-medium text-gray-900">${item.name}</div>
                    </td>
                    <td class="p-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                            ${item.category}
                        </span>
                    </td>
                    <td class="p-4 whitespace-nowrap text-right font-medium ${isLowStock ? 'text-red-600' : 'text-gray-900'}">
                        ${item.quantity} ${stockBadge}
                    </td>
                    <td class="p-4 whitespace-nowrap text-right text-gray-900">
                        <div>${formatCurrency(item.price)}</div>
                        <div class="text-xs text-gray-500">Total: ${formatCurrency(totalVal)}</div>
                    </td>
                    <td class="p-4 whitespace-nowrap text-center">
                        <div class="flex justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editItemTrigger(${item.id})" class="text-indigo-600 hover:text-indigo-900 p-1 bg-indigo-50 rounded">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button onclick="deleteItemTrigger(${item.id})" class="text-red-600 hover:text-red-900 p-1 bg-red-50 rounded">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </td>
                `;
                listContainer.appendChild(tr);
            });
        };

        const loadData = async () => {
            try {
                currentItems = await getAllItems();
                // Sort newest first technically, but we'll just reverse the array
                currentItems.reverse(); 
                filterAndRender();
                updateDashboardStats(currentItems);
            } catch (error) {
                console.error("Failed to load items", error);
            }
        };

        const filterAndRender = () => {
            const term = searchInput.value.toLowerCase();
            if (!term) {
                renderItems(currentItems);
                return;
            }
            const filtered = currentItems.filter(item => 
                item.name.toLowerCase().includes(term) || 
                item.category.toLowerCase().includes(term)
            );
            renderItems(filtered);
        };

        // Form Handling
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const idField = document.getElementById('item-id').value;
            const itemData = {
                name: document.getElementById('item-name').value.trim(),
                category: document.getElementById('item-category').value,
                quantity: parseInt(document.getElementById('item-quantity').value, 10),
                price: parseFloat(document.getElementById('item-price').value)
            };

            try {
                if (idField) {
                    itemData.id = Number(idField);
                    await updateItem(itemData);
                    showToast("Item updated successfully");
                } else {
                    await addItem(itemData);
                    showToast("Item added successfully");
                }
                
                resetForm();
                await loadData();
                
            } catch (error) {
                showToast("An error occurred!", "error");
            }
        });

        // Global triggers for inline onclick handlers
        window.deleteItemTrigger = async (id) => {
            if(confirm('Are you sure you want to delete this item?')) {
                try {
                    await deleteItem(id);
                    showToast("Item deleted");
                    await loadData();
                } catch (err) {
                    showToast("Failed to delete", "error");
                }
            }
        };

        window.editItemTrigger = (id) => {
            const item = currentItems.find(i => i.id === id);
            if (!item) return;

            document.getElementById('item-id').value = item.id;
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-quantity').value = item.quantity;
            document.getElementById('item-price').value = item.price;
            
            formTitle.textContent = "Edit Item";
            cancelBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const resetForm = () => {
            form.reset();
            document.getElementById('item-id').value = '';
            formTitle.textContent = "Add New Item";
            cancelBtn.classList.add('hidden');
        };

        cancelBtn.addEventListener('click', resetForm);
        searchInput.addEventListener('input', filterAndRender);

        // Toast Notification
        const showToast = (message, type = 'success') => {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            
            if(type === 'error') {
                toast.classList.replace('bg-gray-900', 'bg-red-600');
            } else {
                toast.classList.replace('bg-red-600', 'bg-gray-900');
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        };

        // --- 4. Boot Up ---
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await initDB();
                await loadData();
            } catch (err) {
                console.error("Initialization failed", err);
                document.body.innerHTML = `<div class="p-8 text-center text-red-600">Failed to initialize database. Ensure your browser supports IndexedDB and isn't blocking storage in private mode.</div>`;
            }
        });

    </script>
</body>
</html>
